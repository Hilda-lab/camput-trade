<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.title}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">校园二手交易平台</a>
    <div class="collapse navbar-collapse">
      <div class="navbar-nav ms-auto">
        <a class="nav-link btn btn-sm btn-success text-white px-3" style="height: 32px; padding-top:2px" href="/login">已有账号？点击登录</a>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
      <div class="col-md-6">
          <div class="card mt-5 shadow-sm">
              <div class="card-header bg-success text-white text-center">
                  <h4 class="mb-0">创建新账号</h4>
              </div>
              <div class="card-body p-4">
                  {{if .error}}
                  <div class="alert alert-danger">{{.error}}</div>
                  {{end}}
                  
                  <form action="/register" method="POST">
                      <div class="mb-3">
                          <label class="form-label text-muted">昵称</label>
                          <input type="text" class="form-control" name="user_name" placeholder="请输入昵称" required>
                      </div>
                      <div class="mb-3">
                          <label class="form-label text-muted">邮箱</label>
                          <input type="email" class="form-control" name="email" placeholder="example@stu.edu.cn" required>
                      </div>
                      <div class="mb-4">
                          <label class="form-label text-muted">密码</label>
                          <input type="password" class="form-control" name="password" placeholder="设置密码" required>
                      </div>
                      <button type="submit" class="btn btn-success btn-lg w-100 mb-3">立 即 注 册</button>
                      <div class="text-center">
                          <a href="/login" class="text-decoration-none text-muted">回到登录系统</a>
                      </div>
                  </form>
              </div>
          </div>
      </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
