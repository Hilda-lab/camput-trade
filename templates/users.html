{{define "users.html"}}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.title}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">校园二手交易平台</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/items">商品</a>
      <a class="nav-link active" href="/users">用户</a>
      <a class="nav-link" href="/orders">订单</a>
      <a class="nav-link" href="/reports">查询统计</a>
    </div>
  </div>
</nav>
<div class="container py-4">
  <h1 class="h4 mb-3">用户列表</h1>
  {{if .message}}<div class="alert alert-warning">{{.message}}</div>{{end}}
  <table class="table table-striped table-sm">
    <thead><tr><th>ID</th><th>姓名</th><th>邮箱</th></tr></thead>
    <tbody>
    {{range .rows}}
    <tr>
      <td>{{index . "user_id"}}</td>
      <td>{{index . "user_name"}}</td>
      <td>{{index . "email"}}</td>
    </tr>
    {{end}}
    </tbody>
  </table>
</div>
</body>
</html>
{{end}}
