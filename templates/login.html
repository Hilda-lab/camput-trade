<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.title}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">校园二手交易平台</a>
    <div class="collapse navbar-collapse">
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="/items">商品</a>
        <a class="nav-link" href="/users">用户</a>
        <a class="nav-link" href="/orders">订单</a>
        <a class="nav-link" href="/reports">查询统计</a>
      </div>
      <div class="navbar-nav ms-auto">
        {{if .loggedIn}}
        <span class="navbar-text text-light me-3">
          当前登录: {{.user_name}} ({{.user_id}})
        </span>
        <a class="nav-link btn btn-sm btn-danger text-white px-3" style="height: 32px; padding-top:2px" href="/logout">登出</a>
        {{else}}
        <a class="nav-link btn btn-sm btn-success text-white px-3" style="height: 32px; padding-top:2px" href="/login">登录身份</a>
        {{end}}
      </div>
    </div>
  </div>
</nav>
<div class="container py-4">
  <div class="row justify-content-center">
      <div class="col-md-6">
          <div class="card mt-5 shadow-sm">
              <div class="card-header bg-success text-white text-center">
                  <h4 class="mb-0">用户登录</h4>
              </div>
              <div class="card-body p-4">
                  {{if .error}}
                  <div class="alert alert-danger">{{.error}}</div>
                  {{end}}
                  <form action="/login" method="POST">
                      <div class="mb-4">
                          <label class="form-label text-muted">邮箱地址 / 账号ID</label>
                          <input type="text" class="form-control" name="email" placeholder="example@stu.edu.cn 或 u001" required>
                      </div>
                      <div class="mb-4">
                          <label class="form-label text-muted">密码</label>
                          <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
                      </div>
                      <button type="submit" class="btn btn-success btn-lg w-100 mb-3">登录系统</button>
                      <div class="text-center">
                          <a href="/register" class="text-decoration-none text-muted">没有账号？点击注册</a>
                      </div>
                  </form>
              </div>
          </div>
      </div>
  </div>
</div>
</body>
</html>
